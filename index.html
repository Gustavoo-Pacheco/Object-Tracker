<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rastreador Modelagem</title>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <nav id="toolbar">
      <span class="app-title" data-i18n="app.title">Rastreador Modelagem</span>
      <div class="tool-group">
        <button id="tool-axis" class="tool-btn" disabled data-i18n="tool.axis">Definir Eixo</button>
        <button id="tool-scale" class="tool-btn" disabled data-i18n="tool.scale">Medida de Referência</button>
        <button id="tool-bbox" class="tool-btn" disabled data-i18n="tool.bbox">Selecionar Objeto</button>
      </div>
      <div class="toolbar-right">
        <span id="cv-status" class="hint"></span>
        <button id="btn-change-video" class="tool-btn" hidden data-i18n="setup.change_video">Selecionar outro vídeo</button>
        <button id="btn-reset-frame" class="tool-btn accent-btn" hidden data-i18n="setup.choose_frame">Escolher outro frame</button>
        <button id="btn-theme" class="icon-btn theme-toggle" type="button" title="Alternar tema" aria-label="Alternar tema">
          <svg class="theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <svg class="theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"/>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
        </button>
      </div>
    </nav>

    <main>
      <section id="stage-wrap">
        <!-- video viewport -->
        <div id="stage-area">
          <video id="src" hidden playsinline muted></video>
          <canvas id="stage"></canvas>
          <div id="cursor-ui" hidden></div>
          <div id="drop-overlay">
            <div class="drop-inner">
              <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="17 8 12 3 7 8"/>
                <line x1="12" y1="3" x2="12" y2="15"/>
              </svg>
              <p data-i18n="stage.drop">Arraste um vídeo aqui</p>
              <p class="hint" data-i18n="stage.drop_hint">ou use o seletor abaixo</p>
              <div class="file-actions">
                <label class="file-label">
                  <input type="file" id="file" accept="video/*" />
                  <span data-i18n="stage.browse">Escolher arquivo</span>
                </label>
                <div class="example-picker">
                  <button type="button" id="btn-examples" class="file-btn" data-i18n="stage.examples">Usar exemplo</button>
                  <ul id="examples-menu" class="examples-menu" hidden>
                    <li><button type="button" class="example-item" data-src="/videos/arremesso-mola-2-bolas.mp4" data-name="Arremesso com mola 2 bolas.mp4">Arremesso com mola — 2 bolas</button></li>
                    <li><button type="button" class="example-item" data-src="/videos/lancamento-obliquo.mp4" data-name="Lancamento Oblíquo.mp4">Lançamento Oblíquo</button></li>
                  </ul>
                </div>
              </div>
            </div>
          </div>

          <!-- playback controls overlay — shown after tracking completes -->
          <div id="playback-controls" hidden>
            <button id="pb-step-back" class="pb-btn" title="Frame anterior (←)">&#9664;</button>
            <button id="pb-play" class="pb-btn" data-i18n="pb.play">&#9654;</button>
            <button id="pb-step-fwd" class="pb-btn" title="Próximo frame (→)">&#9654;&#9654;</button>
            <span id="pb-counter" class="tabular">0 / 0</span>
          </div>
        </div>

        <!-- navigate bar — separate section below video, phase 1 -->
        <div id="nav-bar" hidden></div>
      </section>

      <div class="splitter splitter-v" id="split-main" role="separator" aria-orientation="vertical" tabindex="0"></div>

      <aside id="panel">
        <div id="phase-ui"></div>

        <div class="splitter splitter-h" id="split-phase" role="separator" aria-orientation="horizontal" tabindex="0" hidden></div>

        <section id="plot-wrap">
          <h2 data-i18n="plot.title">Trajetória</h2>
          <div id="plot">
            <p class="plot-empty hint" data-i18n="plot.empty">Nenhum dado. Rastreie um vídeo para ver os resultados.</p>
          </div>
        </section>

        <div class="splitter splitter-h" id="split-panel" role="separator" aria-orientation="horizontal" tabindex="0"></div>

        <section id="table-wrap">
          <div class="table-header">
            <h2 data-i18n="table.title">Dados</h2>
            <div id="col-toggles" class="col-toggles" role="group" aria-label="Colunas visíveis"></div>
          </div>
          <div id="data-table-scroll">
            <table id="data-table">
              <thead>
                <tr>
                  <th data-col="frame" data-i18n="col.frame">frame</th>
                  <th data-col="time" data-i18n="col.time">tempo (s)</th>
                  <th data-col="x" data-i18n="col.x">x (m)</th>
                  <th data-col="y" data-i18n="col.y">y (m)</th>
                  <th data-col="vx" data-i18n="col.vx">vx (m/s)</th>
                  <th data-col="vy" data-i18n="col.vy">vy (m/s)</th>
                </tr>
              </thead>
              <tbody id="table-body"></tbody>
            </table>
            <p id="table-empty" class="hint" data-i18n="table.empty">—</p>
          </div>
        </section>
      </aside>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
